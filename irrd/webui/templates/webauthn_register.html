{% extends "base.html" %}
{% block content %}
    <h2>Register new security token</h2>
    <div class="row">
        <div class="col-lg-12">
            <div id="error-box" class="alert alert-danger d-none" role="alert">
                Registration did not succeed.
                This may be because you cancelled authentication, used an unsupported key,
                or used a key that is already configured.
            </div>
            <hr>
            <div class="mb-3">
                <label class="form-label" for="name">Token name (optional, for your own reference)</label>
                <input class="form-control" id="name" name="name" required type="text" value="">
            </div>
            <div class="mb-3">
                <button id="webauthn-register" class="btn btn-primary btn-block">
                    Register new token
                </button>
            </div>
        </div>
    </div>
    <div id="webauthn-register-data"
         data-options="{{ webauthn_options_json }}"
         data-verify-url="{{ url_for('ui:auth:webauthn_verify_registration_response') }}"
         data-success-url="{{ url_for('ui:auth:mfa_status') }}"></div>
    <script src="/static/js/simplewebauthn-browser-es5-umd.js"></script>
    <script src="/static/js/webauthn_register.js"></script>
{% endblock %}
